<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>movelooper docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css" />
  <link rel="stylesheet" href="custom.css" />
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'movelooper',
      repo: 'https://github.com/lucasassuncao/movelooper',
      basePath: window.location.hostname === 'localhost' ? '../../' : '../',
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        noData: 'No results.',
        placeholder: 'Search docs…',
      },
      relativePath: true,
      themeColor: '#58a6ff',
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- language components register on docsify's own Prism instance -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
