## ─────────────────────────────────────────────────────────────────────────────
## hooks.yaml — before / after hooks
##
## Hooks run shell commands immediately before or after a category is processed.
## Each hook specifies a shell, an on-failure policy, and a list of commands.
##
## Environment variables injected into every command:
##
##   Both before and after:
##     ML_CATEGORY     category name
##     ML_SOURCE_PATH  source directory
##     ML_DEST_PATH    destination directory
##     ML_DRY_RUN      "true" | "false"
##     ML_ACTION       "move" | "copy" | "symlink"
##
##   After only:
##     ML_FILES_MOVED  number of files successfully processed
##     ML_FILES_FAILED number of files that failed
##     ML_BATCH_ID     unique batch ID (useful for targeted undo)
##
## This file is an example only. To use it:
##   • Rename or copy it to movelooper.yaml next to the executable, OR
##   • Pass it directly:  movelooper --config path/to/hooks.yaml
##                                   -c path/to/hooks.yaml
## ─────────────────────────────────────────────────────────────────────────────

configuration:
  output: console
  log-level: info

categories:
  ## ── bash — simple before/after logging ───────────────────────────────────
  - name: "bash-hooks"
    source:
      path: /home/user/Downloads
      extensions: ["pdf"]
    destination:
      path: /home/user/Documents/PDFs
      conflict-strategy: rename
    hooks:
      before:
        shell: bash
        on-failure: warn
        run:
          - 'echo "[$ML_CATEGORY] starting — source: $ML_SOURCE_PATH"'
      after:
        shell: bash
        on-failure: warn
        run:
          - 'echo "[$ML_CATEGORY] $ML_FILES_MOVED file(s) moved. Batch: $ML_BATCH_ID"'

  ## ── PowerShell — Windows variant ─────────────────────────────────────────
  - name: "powershell-hooks"
    source:
      path: "C:\\Users\\user\\Downloads"
      extensions: ["docx", "xlsx"]
    destination:
      path: "C:\\Users\\user\\Documents\\Office"
      conflict-strategy: rename
    hooks:
      before:
        ## shell: use "pwsh" for PowerShell 7+, "powershell" for Windows PowerShell 5.
        shell: pwsh
        on-failure: warn
        run:
          - 'Write-Output "[$env:ML_CATEGORY] starting"'
      after:
        shell: pwsh
        on-failure: warn
        run:
          - |
            if ([int]$env:ML_FILES_MOVED -gt 0) {
              Write-Output "[$env:ML_CATEGORY] $env:ML_FILES_MOVED file(s) moved. Batch: $env:ML_BATCH_ID"
            }

  ## ── on-failure: abort — stop the category if a pre-condition fails ───────
  - name: "strict-before-hook"
    source:
      path: /home/user/Downloads
      extensions: ["zip"]
    destination:
      path: /home/user/Archives
      conflict-strategy: skip
    hooks:
      before:
        shell: bash
        ## "abort" prevents any file from being moved if the command exits non-zero.
        ## Use this to assert pre-conditions (writable destination, free space, etc.).
        on-failure: abort
        run:
          - 'test -w "$ML_DEST_PATH" || (echo "destination not writable" && exit 1)'
      after:
        shell: bash
        on-failure: warn
        run:
          - 'logger -t movelooper "[$ML_CATEGORY] batch $ML_BATCH_ID: $ML_FILES_MOVED moved"'

  ## ── multi-command after hook with dry-run awareness ──────────────────────
  - name: "dry-run-aware"
    source:
      path: /home/user/Downloads
      extensions: ["mp4", "mkv"]
    destination:
      path: /home/user/Videos
      conflict-strategy: rename
    hooks:
      after:
        shell: bash
        on-failure: warn
        run:
          - |
            if [ "$ML_DRY_RUN" = "true" ]; then
              echo "[$ML_CATEGORY] dry-run: $ML_FILES_MOVED file(s) would be moved"
            elif [ "$ML_FILES_MOVED" -gt 0 ]; then
              echo "[$ML_CATEGORY] moved $ML_FILES_MOVED file(s), batch: $ML_BATCH_ID"
              notify-send "movelooper" "$ML_FILES_MOVED video(s) organised"
            fi
