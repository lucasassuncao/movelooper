## movelooper.yaml — example configuration file
## Full field reference is documented inline below.

configuration:
  ## output: where log messages are written.
  ## Accepted values: "console" | "file" | "both"
  ## Default: "console"
  output: both

  ## log-file: path to the log file. Required when output is "file" or "both".
  log-file: "D:\\Scripts\\go\\logs\\movelooper.log"

  ## log-level: minimum severity level to emit.
  ## Accepted values: "trace" | "debug" | "info" | "warn" | "error" | "fatal"
  ## Default: "info"
  log-level: info

  ## show-caller: include the source file and line number in every log entry.
  ## Default: false
  show-caller: false

  ## watch-delay: how long a file must be unchanged before it is moved in watch mode.
  ## Accepts Go duration strings: "30s", "5m", "1h", etc.
  ## Default: 5m
  watch-delay: 10s

  ## history-limit: maximum number of move batches kept in the undo history.
  ## Default: 50
  history-limit: 100

categories:
  ## name: human-readable label used in logs and the undo history. (required)
  - name: "wallhaven"

    ## enabled: when false, this category is skipped entirely (move and watch modes).
    ## Default: true (omitting the field also means enabled)
    enabled: true

    source:
      ## path: directory to watch / scan for files. (required)
      path: "C:\\Users\\lucas\\Downloads\\"

      ## extensions: list of file extensions to match, without the leading dot. (required)
      ## Use ["all"] to match any file extension.
      extensions: ["jpg", "png"]

      filter:
        ## regex: match filenames against a regular expression (RE2 syntax).
        ## Mutually exclusive with glob — use one or the other, not both.
        regex: "^wallhaven"

        ## glob: match filenames against a shell glob pattern (e.g. "report_*.pdf").
        ## Mutually exclusive with regex — use one or the other, not both.
        # glob: "*wallhaven*"

        ## ignore: list of glob patterns; matching filenames are skipped entirely.
        ## Multiple patterns are evaluated with OR logic.
        # ignore:
        #   - "*.tmp"
        #   - "~*"

        ## min-age: only move files whose modification time is older than this duration.
        ## Accepts Go duration strings: "10m", "2h", "24h", etc.
        # min-age: 10m

        ## max-age: only move files whose modification time is more recent than this duration.
        ## Accepts Go duration strings: "10m", "2h", "24h", etc.
        # max-age: 24h

        ## min-size: only move files at least this large.
        ## Accepted units: B, KB, MB, GB, TB (case-insensitive). Example: "500KB", "1MB"
        # min-size: 500KB

        ## max-size: only move files no larger than this.
        ## Accepted units: B, KB, MB, GB, TB (case-insensitive). Example: "100MB", "2GB"
        # max-size: 100MB

    destination:
      ## path: root directory where matched files are moved. (required)
      path: "C:\\Users\\lucas\\Imagens\\Walls\\Wallhaven"

      ## conflict-strategy: what to do when a file with the same name already exists.
      ## Accepted values:
      ##   "rename"     — append a numeric suffix to the incoming file (e.g. file_1.jpg)  [default]
      ##   "overwrite"  — replace the existing file unconditionally
      ##   "skip"       — leave the incoming file in the source directory
      ##   "hash_check" — compare SHA-256 hashes: if identical, delete the source (deduplication);
      ##                  if different, move with a numeric suffix (same as "rename")
      conflict-strategy: hash_check

      ## organize-by: template that defines the subdirectory structure under <path>.
      ## Tokens: {ext}, {ext-upper}, {name}, {mod-year}, {mod-month}, {mod-day}, {mod-date},
      ##         {mod-weekday}, {created-year}, {created-month}, {created-day}, {created-date},
      ##         {year}, {month}, {day}, {date}, {weekday}, {size-range}, {category}
      ## Leave empty (or omit) to move files directly into <path>.
      ## Example: "{ext}/{mod-year}/{mod-month}" → path/jpg/2025/04/file.jpg
      organize-by: "{ext}"

  - name: "Anna's Archive"
    source:
      path: "C:\\Users\\lucas\\Downloads\\"
      extensions: ["pdf", "epub", "mobi"]
      filter:
        glob: "*Anna's Archive*"
    destination:
      path: "C:\\Users\\lucas\\Downloads\\Annas\\"
      conflict-strategy: hash_check
      organize-by: "{ext}"

  - name: "images"
    source:
      path: "C:\\Users\\lucas\\Downloads\\"
      extensions: ["jpg", "jpeg", "png", "gif", "webp"]
    destination:
      path: "C:\\Users\\lucas\\Downloads\\Media\\Images\\"
      conflict-strategy: rename
      organize-by: "{ext}"

    ## hooks: optional shell commands to run before/after processing this category.
    ## shell: executable to use. For PowerShell use "pwsh" or "powershell".
    ##        Defaults to cmd on Windows, $SHELL on Linux/macOS.
    ## on-failure: "abort" stops the category on error; "warn" logs and continues.
    ## run: list of commands executed in sequence.
    ## Available env vars (before + after): ML_CATEGORY, ML_SOURCE_PATH, ML_DEST_PATH, ML_DRY_RUN, ML_ACTION
    ## Available env vars (after only):     ML_FILES_MOVED, ML_FILES_FAILED, ML_BATCH_ID
    # hooks:
    #   before:
    #     shell: pwsh
    #     on-failure: warn
    #     run:
    #       - 'Write-Output "[$env:ML_CATEGORY] Starting..."'
    #   after:
    #     shell: pwsh
    #     on-failure: warn
    #     run:
    #       - |
    #         if ($env:ML_FILES_MOVED -gt 0) {
    #           Write-Output "[$env:ML_CATEGORY] $env:ML_FILES_MOVED files moved. Batch: $env:ML_BATCH_ID"
    #         }

  - name: "audio"
    source:
      path: "C:\\Users\\lucas\\Downloads\\"
      extensions: ["mp3", "m4a", "aac", "ogg"]
    destination:
      path: "C:\\Users\\lucas\\Downloads\\Media\\Audio\\"
      conflict-strategy: rename
      organize-by: "{ext}"

  - name: "video"
    source:
      path: "C:\\Users\\lucas\\Downloads\\"
      extensions: ["mp4", "mkv"]
    destination:
      path: "C:\\Users\\lucas\\Downloads\\Media\\Video\\"
      conflict-strategy: rename
      organize-by: "{ext}"

  - name: "documents"
    source:
      path: "C:\\Users\\lucas\\Downloads\\"
      extensions: ["pdf", "txt", "docx", "pptx", "epub", "mobi", "md"]
      filter:
        ignore:
          - "*Anna's Archive*"
    destination:
      path: "C:\\Users\\lucas\\Downloads\\Documents\\"
      conflict-strategy: rename
      organize-by: "{ext}"

  - name: "compressed"
    source:
      path: "C:\\Users\\lucas\\Downloads\\"
      extensions: ["zip", "rar", "7z"]
    destination:
      path: "C:\\Users\\lucas\\Downloads\\Compressed\\"
      conflict-strategy: rename
      organize-by: "{ext}"

  - name: "installers"
    source:
      path: "C:\\Users\\lucas\\Downloads\\"
      extensions: ["exe", "msi", "apk", "pkg", "jar"]
    destination:
      path: "C:\\Users\\lucas\\Downloads\\Installers\\"
      conflict-strategy: hash_check
      organize-by: "{ext}"

  - name: "others"
    source:
      path: "C:\\Users\\lucas\\Downloads\\"
      extensions: ["iso", "torrent"]
    destination:
      path: "C:\\Users\\lucas\\Downloads\\Others\\"
      conflict-strategy: rename

  - name: "fonts"
    source:
      path: "C:\\Users\\lucas\\Downloads\\"
      extensions: ["ttf", "otf"]
    destination:
      path: "C:\\Users\\lucas\\Downloads\\Others\\fonts\\"
      conflict-strategy: rename
