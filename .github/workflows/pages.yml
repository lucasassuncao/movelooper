name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "images/**"

  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Prepare site content
        run: |
          cp docs/_sidebar.md docs/pages/
          find docs -maxdepth 1 -name "*.md" -exec cp {} docs/pages/ \;
          [ -f docs/pages/commands.md ] && mv docs/pages/commands.md docs/pages/COMMANDS.md || true
          cp -r docs/movelooper docs/pages/
          cp -r docs/dev docs/pages/

      - name: Delete stale artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[] | select(.name == "github-pages") | .id' | \
          xargs -I{} gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/{} || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
